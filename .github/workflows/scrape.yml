name: Daily Card Scrape

on:
  schedule:
    - cron: '0 2 */2 * *'  # 2:00 AM UTC every 2 days
  workflow_dispatch:        # adds a "Run workflow" button in the GitHub UI

permissions:
  contents: write           # needed to commit the CSV back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: |
          # Read all URLs from yyt.txt and pass them as arguments to the scraper
          python yuyu_scraper.py --out yuyu_cards_new.csv --exact-names names_exact.csv --names names.csv $(cat yyt.txt | tr '\n' ' ')

      - name: Validate and replace CSV
        run: |
          # Only replace the live CSV if the new one actually has data rows
          if [ -f yuyu_cards_new.csv ]; then
            LINES=$(wc -l < yuyu_cards_new.csv)
            if [ "$LINES" -gt 1 ]; then
              mv yuyu_cards_new.csv yuyu_cards_latest.csv
              echo "Scrape succeeded: $LINES lines"
            else
              echo "Scrape returned no data — keeping existing CSV"
              rm -f yuyu_cards_new.csv
            fi
          else
            echo "Scraper produced no output file — keeping existing CSV"
          fi

      - name: Write metadata
        run: |
          if [ -f yuyu_cards_latest.csv ]; then
            COUNT=$(tail -n +2 yuyu_cards_latest.csv | wc -l)
          else
            COUNT=0
          fi
          echo "{\"updated\":\"$(date -u +%Y-%m-%d)\",\"time\":\"$(date -u +%H:%M) UTC\",\"count\":$COUNT}" > meta.json

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meta.json names.csv names_exact.csv
          [ -f yuyu_cards_latest.csv ] && git add yuyu_cards_latest.csv || true
          git diff --staged --quiet || git commit -m "data: update cards $(date -u +%Y-%m-%d)"
          git push
